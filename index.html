<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎲 Portal de Comunidad - Rol de Mesa</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- ============ HEADER / NAVEGACIÓN ============ -->
        <header class="header">
            <div class="header-container">
                <div class="logo" onclick="navigateTo('home')" style="cursor:pointer;">
                    <span class="logo-icon">🎲</span>
                    <span class="logo-text">RolCommunity</span>
                </div>
                <nav class="nav" id="mainNav">
                    <a href="javascript:void(0)" class="nav-link active" data-page="home" onclick="navigateTo('home')">Inicio</a>
                    <a href="javascript:void(0)" class="nav-link" data-page="explore" onclick="navigateTo('explore')">Explorar</a>
                    <a href="javascript:void(0)" class="nav-link" data-page="characters" onclick="navigateTo('characters')">Personajes</a>
                    <a href="javascript:void(0)" class="nav-link" data-page="my-posts" id="myPostsLink" style="display:none;" onclick="navigateTo('my-posts')">Mis Publicaciones</a>
                    <a href="javascript:void(0)" class="nav-link" data-page="profile" id="profileLink" style="display:none;" onclick="navigateTo('profile')">Perfil</a>
                    <a href="javascript:void(0)" class="nav-link" data-page="moderator" id="moderatorLink" style="display:none;" onclick="navigateTo('moderator')">🛡️ Moderación</a>
                </nav>
                <div class="auth-buttons" id="authButtons">
                    <button class="btn btn-outline" onclick="navigateTo('login')">Iniciar Sesión</button>
                    <button class="btn btn-primary" onclick="navigateTo('register')">Registrarse</button>
                </div>
                <div class="user-info" id="userInfo" style="display:none;">
                    <span class="user-name" id="userNameDisplay">Usuario</span>
                    <button class="btn btn-outline btn-sm" onclick="logout()">Cerrar Sesión</button>
                </div>
            </div>
        </header>

        <!-- ============ CONTENIDO PRINCIPAL ============ -->
        <main class="main-content" id="mainContent">
            <!-- Las páginas se cargan dinámicamente aquí -->
        </main>

        <!-- ============ FOOTER ============ -->
        <footer class="footer">
            <p>🎲 Portal de Comunidad para Juego de Rol de Mesa Digitalizado © 2026</p>
            <p>Equipo AgileRol - Pablo Estay & Cristian Cañas</p>
        </footer>
    </div>

    <!-- ============ MODALES ============ -->
    <div class="modal-overlay" id="modalOverlay" style="display:none;" onclick="if(event.target===this) closeModal()">
        <div class="modal" id="modalContent">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
